server:
  port: 8088
  error:
    include-message: always

spring:
  application:
    name: baknusbelajar-api

  datasource:
    url: jdbc:oracle:thin:@192.168.100.2:1521/XEPDB1
    username: sys as sysdba
    password: YOUR_DB_PASSWORD
    driver-class-name: oracle.jdbc.OracleDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.OracleDialect

  data:
    redis:
      host: 192.168.100.2
      port: 6379
      password: YOUR_REDIS_PASSWORD

jwt:
  secret: YOUR_JWT_SECRET
  expirationMs: 86400000

mailcow:
  url: http://mail.smk.baktinusantara666.sch.id
  api-key: YOUR_MAILCOW_API_KEY

gemini:
  keys: YOUR_GEMINI_KEYS_HERE
  model: gemini-flash-latest

grok:
  api-key: YOUR_GROK_API_KEY

# Fallback AI provider (used when Gemini quota is exceeded)
# Supports: openai, grok (xAI)
fallback-ai:
  # provider: openai
  # api-key: YOUR_OPENAI_API_KEY
  # model: gpt-4o-mini
  # base-url: https://api.openai.com/v1
  provider: grok
  api-key: YOUR_GROK_API_KEY
  model: grok-2-latest
  base-url: https://api.x.ai/v1

baknus-drive:
  url: http://baknusdrive.smkbn666.sch.id/api
  api-key: BAKNUS_CLASS_SECRET

logging:
  level:
    org.springframework.security: INFO