server:
  port: 8088
  error:
    include-message: always

spring:
  application:
    name: baknusbelajar-api

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.http.client.HttpClientAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@192.168.100.2:1521/XEPDB1}
    username: ${DB_USERNAME:sys as sysdba}
    password: ${DB_PASSWORD:REDACTED}
    driver-class-name: oracle.jdbc.OracleDriver
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.OracleDialect

  data:
    redis:
      host: ${REDIS_HOST:192.168.100.2}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:REDACTED}

jwt:
  secret: ${JWT_SECRET:REDACTED}
  expirationMs: 86400000

mailcow:
  url: http://mail.smk.baktinusantara666.sch.id
  api-key: ${MAILCOW_API_KEY:REDACTED}

gemini:
  keys: ${GEMINI_KEYS:REDACTED}
  model: gemini-1.5-flash-latest


# Fallback AI provider (used when Gemini quota is exceeded)
# Supports: openai, grok (xAI), mistral
fallback-ai:
  provider: mistral
  keys: ${FALLBACK_AI_KEYS:REDACTED}
  model: mistral-large-latest
  base-url: https://api.mistral.ai/v1

baknus-drive:
  url: https://baknusdrive.smkbn666.sch.id/api
  api-key: ${BAKNUS_DRIVE_API_KEY:REDACTED}

logging:
  level:
    org.springframework.security: INFO
    com.baknusbelajar.api.service: DEBUG