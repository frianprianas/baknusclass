version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: baknusbelajar-oracle
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=${DB_PASSWORD}
      - ORACLE_DATABASE=BAKNUSDB
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - baknus-network

  backend:
    build: ./backend
    container_name: baknusbelajar-backend
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - DB_USERNAME=SYSTEM
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_KEYS=${GEMINI_KEYS}
      - FALLBACK_AI_KEYS=${FALLBACK_AI_KEYS}
      - MAILCOW_API_KEY=${MAILCOW_API_KEY}
      - BAKNUS_DRIVE_API_KEY=${BAKNUS_DRIVE_API_KEY}
    depends_on:
      - oracle-db
      - redis
    networks:
      - baknus-network

  frontend:
    build: ./frontend
    container_name: baknusbelajar-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - baknus-network

  redis:
    image: redis:7-alpine
    container_name: baknusbelajar-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - baknus-network

networks:
  baknus-network:
    driver: bridge

volumes:
  oracle_data:
  redis_data:
