version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: baknusbelajar-oracle
    # Port 1521 dihapus dari host agar tidak bentrok, tetap bisa diakses internal oleh backend
    environment:
      - ORACLE_PASSWORD=${DB_PASSWORD}
      - ORACLE_DATABASE=BAKNUSDB
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - baknus-network

  backend:
    build: ./backend
    container_name: baknusbelajar-backend
    # Tetap diekspos jika ingin akses API langsung, hapus jika tidak perlu (opsional)
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - DB_USERNAME=SYSTEM
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_KEYS=${GEMINI_KEYS}
      - FALLBACK_AI_KEYS=${FALLBACK_AI_KEYS}
      - MAILCOW_API_KEY=${MAILCOW_API_KEY}
      - BAKNUS_DRIVE_API_KEY=${BAKNUS_DRIVE_API_KEY}
    depends_on:
      - oracle-db
      - redis
    networks:
      - baknus-network

  # Port Frontend diganti ke 8080 agar tidak bentrok dengan port 80 standar (biasanya dipakai Nginx lain/Apache)
  frontend:
    build: ./frontend
    container_name: baknusbelajar-frontend
    ports:
      - "8080:80" 
    depends_on:
      - backend
    networks:
      - baknus-network

  redis:
    image: redis:7-alpine
    container_name: baknusbelajar-redis
    # Hapus baris ports agar tidak bentrok dengan Redis lain di server host
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - baknus-network

networks:
  baknus-network:
    driver: bridge

volumes:
  oracle_data:
  redis_data:
